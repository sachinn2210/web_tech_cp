{% extends 'base.html' %}

{% block content %}
<h1>Register</h1>

<form method="post">
    {% csrf_token %}
    <label>Username:</label><br>
    <input type="text" name="username" style="width: 100%; padding: 8px;" required><br><br>
    
    <label>Email:</label><br>
    <input type="email" name="email" style="width: 100%; padding: 8px;" required><br><br>
    
    <label>Password:</label><br>
    <input type="password" name="password" style="width: 100%; padding: 8px;" required><br><br>
    
    <label>Confirm Password:</label><br>
    <input type="password" name="password2" style="width: 100%; padding: 8px;" required><br><br>
    
    <button type="submit" class="btn">Register</button>
</form>

<p style="margin-top: 20px;">Already have an account? <a href="{% url 'login' %}">Login here</a></p>
{% endblock %}
