{% extends 'base.html' %}

{% block content %}
<h1>Edit Profile</h1>

<form method="post">
    {% csrf_token %}
    <label>Bio:</label><br>
    <textarea name="bio" rows="5" style="width: 100%; padding: 8px;">{{ profile.bio }}</textarea><br><br>
    
    <button type="submit" class="btn">Update Profile</button>
    <a href="{% url 'user_profile' user.username %}" class="btn" style="background: #6c757d;">Cancel</a>
</form>
{% endblock %}
